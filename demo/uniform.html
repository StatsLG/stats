<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Uniform Spinner Needle (0–360°)</title>
  <style>
    :root { --size: 360px; }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0; padding: 24px;
      display: grid; place-items: center;
      background: #f6f7fb;
      color: #111;
    }
    .card{
      width: min(720px, 95vw);
      background: #fff;
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      display: grid;
      justify-items: center;
      gap: 14px;
    }
    h2{ margin: 0; font-size: 22px; }
    .stage{
      width: var(--size);
      height: var(--size);
      position: relative;
      display: grid;
      place-items: center;
      user-select: none;
    }
    canvas{
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: #fff;
    }
    button{
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 800;
      font-size: 16px;
      background: #111;
      color: #fff;
      cursor: pointer;
      width: min(420px, 92%);
    }
    button:disabled{ opacity: .55; cursor: not-allowed; }
    .out{
      text-align: center;
      display: grid;
      gap: 6px;
    }
    .deg{
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .small{ font-size: 13px; color: #444; }
    .pills{
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .pill{
      background: #f1f3f7;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Static Wheel + Moving Needle (Uniform 0–360°)</h2>

    <div class="stage">
      <canvas id="dial" width="720" height="720"></canvas>
    </div>

    <button id="spinBtn">SPIN</button>

    <div class="out" aria-live="polite">
      <div class="deg" id="angleText">—</div>
      <div class="small">Needle angle (degrees), shown to the hundredths place.</div>
      <div class="pills">
        <div class="pill" id="statusPill">Ready</div>
        <div class="pill">Uniform: U(0, 360)</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('dial');
  const ctx = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinBtn');
  const angleText = document.getElementById('angleText');
  const statusPill = document.getElementById('statusPill');

  let needleDeg = 0;     // 0° = pointing straight up
  let spinning = false;

  function norm360(deg){
    let x = deg % 360;
    if (x < 0) x += 360;
    return x;
  }
  function formatDeg(x){
    return `${x.toFixed(2)}°`;
  }
  function easeOutCubic(t){
    return 1 - Math.pow(1 - t, 3);
  }

  function drawDial(staticNeedleDeg){
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2;
    const r = Math.min(cx, cy) * 0.92;

    ctx.clearRect(0, 0, w, h);

    // ===== Static wheel face =====
    // Base circle
    ctx.save();
    ctx.translate(cx, cy);

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    // Subtle alternating segments just as a static background reference
    const segs = 24;
    for (let i = 0; i < segs; i++){
      const a0 = (i/segs) * Math.PI*2;
      const a1 = ((i+1)/segs) * Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,r,a0,a1);
      ctx.closePath();
      ctx.fillStyle = (i%2===0) ? "#f1f3f7" : "#ffffff";
      ctx.fill();
    }

    // Outer ring
    ctx.lineWidth = r * 0.03;
    ctx.strokeStyle = "#111";
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.stroke();

    // Tick marks every 10°
    for (let deg = 0; deg < 360; deg += 10){
      const rad = (deg * Math.PI)/180;
      const isMajor = (deg % 30 === 0);
      const isCardinal = (deg % 90 === 0);
      const len = isCardinal ? r*0.16 : isMajor ? r*0.11 : r*0.07;

      ctx.lineWidth = isCardinal ? r*0.012 : isMajor ? r*0.009 : r*0.006;
      ctx.strokeStyle = "#111";

      ctx.beginPath();
      ctx.moveTo(Math.cos(rad)*(r-len), Math.sin(rad)*(r-len));
      ctx.lineTo(Math.cos(rad)*(r-r*0.02), Math.sin(rad)*(r-r*0.02));
      ctx.stroke();
    }

    // Optional labels N/E/S/W for orientation
    ctx.fillStyle = "#111";
    ctx.font = `800 ${Math.round(r*0.09)}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("0°", 0, -r*0.78);
    ctx.fillText("90°", r*0.78, 0);
    ctx.fillText("180°", 0, r*0.78);
    ctx.fillText("270°", -r*0.78, 0);

    // ===== Moving needle =====
    // Needle rotates; 0° points up. Canvas angle 0 points right, so subtract 90°.
    ctx.save();
    ctx.rotate(((staticNeedleDeg - 90) * Math.PI) / 180);

    // Needle body
    ctx.lineCap = "round";
    ctx.strokeStyle = "#111";
    ctx.lineWidth = r * 0.03;
    ctx.beginPath();
    ctx.moveTo(-r*0.06, 0);
    ctx.lineTo(r*0.78, 0);
    ctx.stroke();

    // Needle tip triangle
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.moveTo(r*0.82, 0);
    ctx.lineTo(r*0.72, -r*0.06);
    ctx.lineTo(r*0.72, r*0.06);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Hub
    ctx.beginPath();
    ctx.arc(0,0,r*0.09,0,Math.PI*2);
    ctx.fillStyle = "#111";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0,0,r*0.05,0,Math.PI*2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    ctx.restore();
  }

  // initial render
  drawDial(needleDeg);

  function setStatus(t){ statusPill.textContent = t; }

  spinBtn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    setStatus("Spinning…");

    // Uniform target angle in degrees (0 <= angle < 360)
    const target = Math.random() * 360;

    // Add extra rotations for animation: needleDeg increases beyond 360
    const extraTurns = 5 + Math.floor(Math.random() * 4); // 5–8 turns
    const start = needleDeg;

    // Choose an end angle that lands EXACTLY on target (mod 360)
    let end = start + extraTurns * 360;
    end = end - norm360(end) + target;   // match modulo
    if (end <= start) end += 360;

    const duration = 2200 + Math.random() * 700;
    const t0 = performance.now();

    function step(now){
      const t = (now - t0) / duration;
      const clamped = Math.min(1, Math.max(0, t));
      const eased = easeOutCubic(clamped);

      needleDeg = start + (end - start) * eased;
      drawDial(needleDeg);

      if (clamped < 1){
        requestAnimationFrame(step);
      } else {
        needleDeg = end;          // finalize
        drawDial(needleDeg);

        // Display normalized final angle to hundredths
        const finalAngle = norm360(needleDeg);
        angleText.textContent = formatDeg(finalAngle);

        setStatus("Done");
        spinning = false;
        spinBtn.disabled = false;
      }
    }

    requestAnimationFrame(step);
  });
})();
</script>
</body>
</html>
