<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lab 7 Spinner</title>
  <style>
    :root { --size: 360px; --panelW: 820px; }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0; padding: 24px;
      display: grid; place-items: center;
      background: #f6f7fb;
      color: #111;
    }
    .card{
      width: min(var(--panelW), 95vw);
      background: #fff;
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      display: grid;
      justify-items: center;
      gap: 12px;
    }
    h2{ margin: 0; font-size: 22px; text-align:center; }
    .stage{
      width: var(--size);
      height: var(--size);
      display: grid;
      place-items: center;
      user-select: none;
    }
    .dialCanvas{
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: #fff;
      display: block;
    }

    .controls{
      width: min(720px, 95%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button{
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 800;
      font-size: 14px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
    button.secondary{ background: #2b2b2b; }
    button.light{ background: #444; }
    button:disabled{ opacity: .55; cursor: not-allowed; }

    .toggleRow{
      width: min(720px, 95%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .toggle{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f1f3f7;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      color: #111;
      user-select: none;
    }
    .toggle input{ transform: scale(1.2); cursor: pointer; }
    .intervalText{ font-weight: 900; letter-spacing: .2px; }

    .out{
      text-align: center;
      display: grid;
      gap: 6px;
    }
    .deg{
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .small{ font-size: 13px; color: #444; }
    .pills{
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .pill{
      background: #f1f3f7;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: #222;
    }

    .gridBelow{
      width: min(var(--panelW), 95vw);
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }
    .panel{
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
      display: grid;
      gap: 8px;
    }
    .panel h3{
      margin: 0;
      font-size: 16px;
      text-align: center;
    }
    .note{
      font-size: 12.5px;
      color: #444;
      text-align: center;
      margin-top: -4px;
    }
    canvas#histCanvas{
      width: 100%;
      height: auto;
      background: #fff;
      border-radius: 12px;
      display: block;
    }

    table{
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
    }
    th, td{
      border-bottom: 1px solid #e7e9ef;
      padding: 10px 10px;
      text-align: center;
      font-size: 14px;
    }
    th{
      background: #f1f3f7;
      font-weight: 900;
    }
    tr:last-child td{ border-bottom: 0; }
    .muted{ color: #444; font-weight: 800; }

    @media (max-width: 900px){
      .gridBelow{ grid-template-columns: 1fr; }
    }
    @media (max-width: 760px){
      .controls{ grid-template-columns: 1fr 1fr; }
      :root { --size: 320px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Lab 7 Spinner</h2>

    <div class="stage">
      <canvas id="dial" class="dialCanvas" width="720" height="720"></canvas>
    </div>

    <div class="controls">
      <button id="spinBtn">SPIN (animated)</button>
      <button id="spin100Btn" class="secondary">SPIN 100 (fast)</button>
      <button id="spin1000Btn" class="secondary">SPIN 1000 (fast)</button>
      <button id="clearBtn" class="light">CLEAR DATA</button>
    </div>

    <div class="toggleRow">
      <label class="toggle">
        <input type="checkbox" id="rangeToggle" />
        Highlight interval:
        <span class="intervalText">92.45° to 138.73°</span>
      </label>
    </div>

    <div class="out" aria-live="polite">
      <div class="deg" id="angleText">—</div>
      <div class="small">Angle in degrees (to the hundredths place).</div>
      <div class="pills">
        <div class="pill" id="statusPill">Ready</div>
        <div class="pill" id="countPill">Spins: 0</div>
        <div class="pill">Bins: 36 (10° each)</div>
      </div>
    </div>
  </div>

  <div class="gridBelow">
    <div class="panel">
      <h3>Histogram of Spin Angles</h3>
      <canvas id="histCanvas" width="900" height="360"></canvas>
      <div class="note" id="maxBinNote">Max bin: 0</div>
    </div>

    <div class="panel" id="rangePanel" style="display:none;">
      <h3>In-Range vs Out-of-Range</h3>
      <div class="note">
        Interval: <span class="intervalText">92.45° to 138.73°</span>
      </div>
      <table aria-label="Counts and percentages in and out of the target interval">
        <thead>
          <tr>
            <th>Category</th>
            <th>Count</th>
            <th>Percent</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>IN range</strong></td>
            <td id="inCount">0</td>
            <td id="inPct">0.00%</td>
          </tr>
          <tr>
            <td><strong>OUT of range</strong></td>
            <td id="outCount">0</td>
            <td id="outPct">0.00%</td>
          </tr>
          <tr>
            <td class="muted">Total</td>
            <td id="totalCount" class="muted">0</td>
            <td class="muted">100.00%</td>
          </tr>
        </tbody>
      </table>
      <div class="note" id="theoryNote"></div>
    </div>
  </div>

<script>
(() => {
  const RANGE_START = 92.45;
  const RANGE_END   = 138.73;
  const THEORY_P = (RANGE_END - RANGE_START) / 360;

  const dial = document.getElementById('dial');
  const dctx = dial.getContext('2d');

  const histCanvas = document.getElementById('histCanvas');
  const hctx = histCanvas.getContext('2d');

  const spinBtn = document.getElementById('spinBtn');
  const spin100Btn = document.getElementById('spin100Btn');
  const spin1000Btn = document.getElementById('spin1000Btn');
  const clearBtn = document.getElementById('clearBtn');

  const angleText = document.getElementById('angleText');
  const statusPill = document.getElementById('statusPill');
  const countPill = document.getElementById('countPill');
  const maxBinNote = document.getElementById('maxBinNote');

  const rangeToggle = document.getElementById('rangeToggle');
  const rangePanel = document.getElementById('rangePanel');
  const theoryNote = document.getElementById('theoryNote');

  const inCountEl = document.getElementById('inCount');
  const outCountEl = document.getElementById('outCount');
  const totalCountEl = document.getElementById('totalCount');
  const inPctEl = document.getElementById('inPct');
  const outPctEl = document.getElementById('outPct');

  // Unit-circle degrees stored as: 0° at +x, increasing CCW.
  // Canvas y is down, so to draw unit-circle CCW correctly on screen we use rad = -deg.
  let needleDeg = 0;
  let spinning = false;

  const angles = [];
  const BIN_COUNT = 36;
  const binCounts = new Array(BIN_COUNT).fill(0);

  function norm360(deg){
    let x = deg % 360;
    if (x < 0) x += 360;
    return x;
  }
  function formatDeg(x){ return `${x.toFixed(2)}°`; }
  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
  function setStatus(t){ statusPill.textContent = t; }
  function setCount(){ countPill.textContent = `Spins: ${angles.length}`; }
  function inRange(a){ return a >= RANGE_START && a <= RANGE_END; }
  function angleToBin(a){
    const w = 360 / BIN_COUNT;
    return Math.min(BIN_COUNT - 1, Math.max(0, Math.floor(a / w)));
  }
  function ucDegToCanvasRad(deg){
    return -(deg * Math.PI / 180);
  }

  function updateRangeTable(){
    if (!rangeToggle.checked) return;

    const total = angles.length;
    let inC = 0;
    for (const a of angles) if (inRange(a)) inC++;
    const outC = total - inC;

    const inPct = total ? (100 * inC / total) : 0;
    const outPct = total ? (100 * outC / total) : 0;

    inCountEl.textContent = String(inC);
    outCountEl.textContent = String(outC);
    totalCountEl.textContent = String(total);
    inPctEl.textContent = `${inPct.toFixed(2)}%`;
    outPctEl.textContent = `${outPct.toFixed(2)}%`;

    theoryNote.textContent =
      `Theoretical P(IN) = (138.73 − 92.45) / 360 = ${THEORY_P.toFixed(5)} ≈ ${(100*THEORY_P).toFixed(2)}%.`;
  }

  function recordAngle(a){
    angles.push(a);
    binCounts[angleToBin(a)] += 1;
    setCount();
    drawHistogram();
    updateRangeTable();
  }

  function drawDial(needleDegLocal){
    const w = dial.width, h = dial.height;
    const cx = w/2, cy = h/2;
    const r = Math.min(cx, cy) * 0.92;

    dctx.clearRect(0, 0, w, h);
    dctx.save();
    dctx.translate(cx, cy);

    // Face
    dctx.beginPath();
    dctx.arc(0, 0, r, 0, Math.PI*2);
    dctx.fillStyle = "#fff";
    dctx.fill();

    // Subtle segments (background)
    const segs = 24;
    for (let i = 0; i < segs; i++){
      const a0 = (i/segs) * Math.PI*2;
      const a1 = ((i+1)/segs) * Math.PI*2;
      dctx.beginPath();
      dctx.moveTo(0,0);
      dctx.arc(0,0,r,a0,a1);
      dctx.closePath();
      dctx.fillStyle = (i%2===0) ? "#f1f3f7" : "#ffffff";
      dctx.fill();
    }

    // === HIGHLIGHT ON TOP of background (so it stays visible) ===
    if (rangeToggle.checked){
      const startRad = ucDegToCanvasRad(RANGE_START);
      const endRad   = ucDegToCanvasRad(RANGE_END);

      // Thick ring arc
      dctx.save();
      dctx.strokeStyle = "rgba(0,0,0,0.28)";
      dctx.lineWidth = r * 0.14; // thick band
      dctx.lineCap = "butt";
      dctx.beginPath();
      dctx.arc(0, 0, r*0.78, startRad, endRad, true);
      dctx.stroke();
      dctx.restore();

      // Edge rays (very clear endpoints)
      dctx.save();
      dctx.strokeStyle = "rgba(0,0,0,0.55)";
      dctx.lineWidth = r * 0.012;
      const sx = Math.cos(startRad) * r*0.92, sy = Math.sin(startRad) * r*0.92;
      const ex = Math.cos(endRad)   * r*0.92, ey = Math.sin(endRad)   * r*0.92;
      dctx.beginPath(); dctx.moveTo(0,0); dctx.lineTo(sx, sy); dctx.stroke();
      dctx.beginPath(); dctx.moveTo(0,0); dctx.lineTo(ex, ey); dctx.stroke();
      dctx.restore();
    }

    // Outer ring
    dctx.lineWidth = r * 0.03;
    dctx.strokeStyle = "#111";
    dctx.beginPath();
    dctx.arc(0,0,r,0,Math.PI*2);
    dctx.stroke();

    // Tick marks every 10° (unit circle)
    for (let deg = 0; deg < 360; deg += 10){
      const rad = ucDegToCanvasRad(deg);
      const isMajor = (deg % 30 === 0);
      const isCardinal = (deg % 90 === 0);
      const len = isCardinal ? r*0.16 : isMajor ? r*0.11 : r*0.07;

      dctx.lineWidth = isCardinal ? r*0.012 : isMajor ? r*0.009 : r*0.006;
      dctx.strokeStyle = "#111";

      const x1 = Math.cos(rad) * (r - len);
      const y1 = Math.sin(rad) * (r - len);
      const x2 = Math.cos(rad) * (r - r*0.02);
      const y2 = Math.sin(rad) * (r - r*0.02);

      dctx.beginPath();
      dctx.moveTo(x1, y1);
      dctx.lineTo(x2, y2);
      dctx.stroke();
    }

    // Labels
    dctx.fillStyle = "#111";
    dctx.font = `800 ${Math.round(r*0.09)}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    dctx.textAlign = "center";
    dctx.textBaseline = "middle";
    dctx.fillText("0°",   r*0.78,  0);
    dctx.fillText("90°",  0,     -r*0.78);
    dctx.fillText("180°",-r*0.78,  0);
    dctx.fillText("270°", 0,      r*0.78);

    // Needle (CCW visually as degrees increase)
    dctx.save();
    dctx.rotate(ucDegToCanvasRad(needleDegLocal)); // negative radians
    dctx.lineCap = "round";
    dctx.strokeStyle = "#111";
    dctx.lineWidth = r * 0.03;
    dctx.beginPath();
    dctx.moveTo(-r*0.06, 0);
    dctx.lineTo(r*0.78, 0);
    dctx.stroke();

    dctx.fillStyle = "#111";
    dctx.beginPath();
    dctx.moveTo(r*0.82, 0);
    dctx.lineTo(r*0.72, -r*0.06);
    dctx.lineTo(r*0.72,  r*0.06);
    dctx.closePath();
    dctx.fill();
    dctx.restore();

    // Hub
    dctx.beginPath();
    dctx.arc(0,0,r*0.09,0,Math.PI*2);
    dctx.fillStyle = "#111";
    dctx.fill();
    dctx.beginPath();
    dctx.arc(0,0,r*0.05,0,Math.PI*2);
    dctx.fillStyle = "#fff";
    dctx.fill();

    dctx.restore();
  }

  function drawHistogram(){
    const w = histCanvas.width, h = histCanvas.height;
    hctx.clearRect(0,0,w,h);

    const padL = 60, padR = 18, padT = 20, padB = 46;
    const plotW = w - padL - padR;
    const plotH = h - padT - padB;

    hctx.strokeStyle = "#111";
    hctx.lineWidth = 2;
    hctx.beginPath();
    hctx.moveTo(padL, padT);
    hctx.lineTo(padL, padT + plotH);
    hctx.lineTo(padL + plotW, padT + plotH);
    hctx.stroke();

    hctx.fillStyle = "#111";
    hctx.font = "700 13px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    hctx.textAlign = "center";
    hctx.fillText("Angle (degrees, unit-circle)", padL + plotW/2, h - 14);

    hctx.save();
    hctx.translate(18, padT + plotH/2);
    hctx.rotate(-Math.PI/2);
    hctx.textAlign = "center";
    hctx.fillText("Count", 0, 0);
    hctx.restore();

    let maxCount = 0;
    for (const c of binCounts) if (c > maxCount) maxCount = c;
    maxBinNote.textContent = `Max bin: ${maxCount}`;

    if (angles.length === 0){
      hctx.fillStyle = "#444";
      hctx.font = "14px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      hctx.textAlign = "center";
      hctx.fillText("Spin to build the histogram…", padL + plotW/2, padT + plotH/2);
      return;
    }

    const yMax = Math.max(1, maxCount);
    const yticks = [0, Math.ceil(yMax/2), yMax];
    hctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    hctx.textAlign = "right";
    for (const t of yticks){
      const yy = padT + plotH - (t / yMax) * plotH;
      hctx.beginPath();
      hctx.moveTo(padL - 6, yy);
      hctx.lineTo(padL, yy);
      hctx.stroke();
      hctx.fillText(String(t), padL - 10, yy + 4);
    }

    const xticks = [0, 90, 180, 270, 360];
    hctx.textAlign = "center";
    for (const t of xticks){
      const x = padL + (t/360)*plotW;
      hctx.beginPath();
      hctx.moveTo(x, padT + plotH);
      hctx.lineTo(x, padT + plotH + 6);
      hctx.stroke();
      hctx.fillText(String(t), x, padT + plotH + 22);
    }

    const barW = plotW / BIN_COUNT;
    for (let i = 0; i < BIN_COUNT; i++){
      const c = binCounts[i];
      const bh = (c / yMax) * plotH;
      const x = padL + i * barW;
      const y = padT + plotH - bh;

      const binStart = i * (360 / BIN_COUNT);
      const binEnd = (i+1) * (360 / BIN_COUNT);
      const overlaps = rangeToggle.checked && !(binEnd < RANGE_START || binStart > RANGE_END);

      hctx.fillStyle = overlaps ? "#2b2b2b" : "#111";
      hctx.fillRect(x + 1, y, Math.max(0, barW - 2), bh);

      hctx.strokeStyle = "#fff";
      hctx.lineWidth = 1;
      hctx.strokeRect(x + 1, y, Math.max(0, barW - 2), bh);
    }
  }

  function setButtonsDisabled(disabled){
    spinBtn.disabled = disabled;
    spin100Btn.disabled = disabled;
    spin1000Btn.disabled = disabled;
    clearBtn.disabled = disabled;
    rangeToggle.disabled = disabled;
  }

  function spinAnimated(){
    if (spinning) return;
    spinning = true;
    setButtonsDisabled(true);
    setStatus("Spinning…");

    const target = Math.random() * 360;
    const extraTurns = 5 + Math.floor(Math.random() * 4);
    const start = needleDeg;

    let end = start + extraTurns * 360;
    end = end - norm360(end) + target;
    if (end <= start) end += 360;

    const duration = 2200 + Math.random() * 700;
    const t0 = performance.now();

    function step(now){
      const t = (now - t0) / duration;
      const clamped = Math.min(1, Math.max(0, t));
      const eased = easeOutCubic(clamped);

      needleDeg = start + (end - start) * eased;
      drawDial(needleDeg);

      if (clamped < 1){
        requestAnimationFrame(step);
      } else {
        needleDeg = end;
        drawDial(needleDeg);

        const finalAngle = norm360(needleDeg);
        angleText.textContent = formatDeg(finalAngle);
        recordAngle(finalAngle);

        setStatus("Done");
        spinning = false;
        setButtonsDisabled(false);
      }
    }
    requestAnimationFrame(step);
  }

  function spinFast(n){
    if (spinning) return;
    spinning = true;
    setButtonsDisabled(true);
    setStatus(`Spinning ${n} (fast)…`);

    let last = 0;
    for (let i = 0; i < n; i++){
      last = Math.random() * 360;
      recordAngle(last);
    }
    needleDeg = last;
    drawDial(needleDeg);
    angleText.textContent = formatDeg(norm360(last));

    setStatus("Done");
    spinning = false;
    setButtonsDisabled(false);
  }

  function clearData(){
    angles.length = 0;
    binCounts.fill(0);
    angleText.textContent = "—";
    setCount();
    drawHistogram();
    updateRangeTable();
    setStatus("Ready");
  }

  function onToggleChanged(){
    rangePanel.style.display = rangeToggle.checked ? "grid" : "none";
    drawDial(needleDeg);
    drawHistogram();
    updateRangeTable();
  }

  // init
  setCount();
  drawDial(needleDeg);
  drawHistogram();
  theoryNote.textContent =
    `Theoretical P(IN) = (138.73 − 92.45) / 360 = ${THEORY_P.toFixed(5)} ≈ ${(100*THEORY_P).toFixed(2)}%.`;

  spinBtn.addEventListener('click', spinAnimated);
  spin100Btn.addEventListener('click', () => spinFast(100));
  spin1000Btn.addEventListener('click', () => spinFast(1000));
  clearBtn.addEventListener('click', clearData);
  rangeToggle.addEventListener('change', onToggleChanged);
})();
</script>
</body>
</html>
