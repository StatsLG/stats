<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unit-Circle Spinner + Histogram</title>
  <style>
    :root { --size: 360px; --panelW: 760px; }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0; padding: 24px;
      display: grid; place-items: center;
      background: #f6f7fb;
      color: #111;
    }
    .card{
      width: min(var(--panelW), 95vw);
      background: #fff;
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      display: grid;
      justify-items: center;
      gap: 14px;
    }
    h2{ margin: 0; font-size: 22px; text-align:center; }
    .stage{
      width: var(--size);
      height: var(--size);
      position: relative;
      display: grid;
      place-items: center;
      user-select: none;
    }
    .dialCanvas{
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: #fff;
      display: block;
    }

    .controls{
      width: min(660px, 95%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button{
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 800;
      font-size: 14px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
    button.secondary{ background: #2b2b2b; }
    button.light{ background: #444; }
    button:disabled{ opacity: .55; cursor: not-allowed; }

    .out{
      text-align: center;
      display: grid;
      gap: 6px;
    }
    .deg{
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .small{ font-size: 13px; color: #444; }
    .pills{
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .pill{
      background: #f1f3f7;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: #222;
    }

    .charts{
      width: min(var(--panelW), 95vw);
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }
    .panel{
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
      display: grid;
      gap: 8px;
    }
    .panel h3{
      margin: 0;
      font-size: 16px;
      text-align: center;
    }
    .note{
      font-size: 12.5px;
      color: #444;
      text-align: center;
      margin-top: -4px;
    }
    .metaRow{
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #222;
    }
    .metaRow .pill{ font-size: 12.5px; }

    @media (max-width: 760px){
      .controls{ grid-template-columns: 1fr 1fr; }
      :root { --size: 320px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Unit-Circle Spinner (0° on +x) + Histogram</h2>

    <div class="stage">
      <canvas id="dial" class="dialCanvas" width="720" height="720"></canvas>
    </div>

    <div class="controls">
      <button id="spinBtn">SPIN (animated)</button>
      <button id="spin100Btn" class="secondary">SPIN 100 (fast)</button>
      <button id="spin1000Btn" class="secondary">SPIN 1000 (fast)</button>
      <button id="clearBtn" class="light">CLEAR DATA</button>
    </div>

    <div class="out" aria-live="polite">
      <div class="deg" id="angleText">—</div>
      <div class="small">Angle in degrees, to the hundredths place (unit-circle convention).</div>
      <div class="pills">
        <div class="pill" id="statusPill">Ready</div>
        <div class="pill" id="countPill">Spins: 0</div>
        <div class="pill" id="binsPill">Bins: 36 (10° each)</div>
        <div class="pill">Model: Uniform U(0, 360)</div>
      </div>
    </div>
  </div>

  <div class="charts">
    <div class="panel">
      <h3>Histogram of Spin Angles</h3>
      <div class="note">More spins → bars should level out (roughly flat).</div>
      <canvas id="histCanvas" width="760" height="340"></canvas>
      <div class="metaRow">
        <div class="pill" id="maxBinPill">Max bin: 0</div>
        <div class="pill" id="meanPill">Mean: —</div>
      </div>
    </div>
  </div>

<script>
(() => {
  // ===== Elements =====
  const dial = document.getElementById('dial');
  const dctx = dial.getContext('2d');

  const histCanvas = document.getElementById('histCanvas');
  const hctx = histCanvas.getContext('2d');

  const spinBtn = document.getElementById('spinBtn');
  const spin100Btn = document.getElementById('spin100Btn');
  const spin1000Btn = document.getElementById('spin1000Btn');
  const clearBtn = document.getElementById('clearBtn');

  const angleText = document.getElementById('angleText');
  const statusPill = document.getElementById('statusPill');
  const countPill = document.getElementById('countPill');
  const maxBinPill = document.getElementById('maxBinPill');
  const meanPill = document.getElementById('meanPill');

  // ===== Spinner state =====
  // Unit-circle convention: 0° on +x (to the right), increasing CCW.
  // We will store needleDeg in that same convention.
  let needleDeg = 0;
  let spinning = false;

  // ===== Data =====
  const angles = [];
  const BIN_COUNT = 36;      // 10° bins
  const binCounts = new Array(BIN_COUNT).fill(0);

  // ===== Helpers =====
  function norm360(deg){
    let x = deg % 360;
    if (x < 0) x += 360;
    return x;
  }
  function formatDeg(x){ return `${x.toFixed(2)}°`; }
  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
  function setStatus(t){ statusPill.textContent = t; }
  function setCount(){ countPill.textContent = `Spins: ${angles.length}`; }

  function angleToBin(a){
    const w = 360 / BIN_COUNT;
    const idx = Math.floor(a / w);
    return Math.min(BIN_COUNT - 1, Math.max(0, idx));
  }

  function updateMean(){
    if (angles.length === 0) { meanPill.textContent = "Mean: —"; return; }
    // For circular data, "mean angle" is trickier; but for teaching uniform,
    // a simple arithmetic mean is fine as a quick statistic.
    const s = angles.reduce((acc,v)=>acc+v,0);
    meanPill.textContent = `Mean: ${(s/angles.length).toFixed(2)}°`;
  }

  function recordAngle(a){
    angles.push(a);
    const b = angleToBin(a);
    binCounts[b] += 1;
    setCount();
    updateMean();
    drawHistogram();
  }

  // ===== Draw: Dial (static wheel, moving needle) =====
  function drawDial(needleDegLocal){
    const w = dial.width, h = dial.height;
    const cx = w/2, cy = h/2;
    const r = Math.min(cx, cy) * 0.92;

    dctx.clearRect(0, 0, w, h);

    // Static wheel background
    dctx.save();
    dctx.translate(cx, cy);

    // face
    dctx.beginPath();
    dctx.arc(0, 0, r, 0, Math.PI*2);
    dctx.fillStyle = "#fff";
    dctx.fill();

    // subtle segments
    const segs = 24;
    for (let i = 0; i < segs; i++){
      const a0 = (i/segs) * Math.PI*2;
      const a1 = ((i+1)/segs) * Math.PI*2;
      dctx.beginPath();
      dctx.moveTo(0,0);
      dctx.arc(0,0,r,a0,a1);
      dctx.closePath();
      dctx.fillStyle = (i%2===0) ? "#f1f3f7" : "#ffffff";
      dctx.fill();
    }

    // outer ring
    dctx.lineWidth = r * 0.03;
    dctx.strokeStyle = "#111";
    dctx.beginPath();
    dctx.arc(0,0,r,0,Math.PI*2);
    dctx.stroke();

    // tick marks every 10°
    for (let deg = 0; deg < 360; deg += 10){
      const rad = (deg * Math.PI)/180; // 0 rad is +x axis (unit circle)
      const isMajor = (deg % 30 === 0);
      const isCardinal = (deg % 90 === 0);
      const len = isCardinal ? r*0.16 : isMajor ? r*0.11 : r*0.07;

      dctx.lineWidth = isCardinal ? r*0.012 : isMajor ? r*0.009 : r*0.006;
      dctx.strokeStyle = "#111";

      dctx.beginPath();
      dctx.moveTo(Math.cos(rad)*(r-len), Math.sin(rad)*(r-len));
      dctx.lineTo(Math.cos(rad)*(r-r*0.02), Math.sin(rad)*(r-r*0.02));
      dctx.stroke();
    }

    // Labels: 0° right, 90° up, 180° left, 270° down
    dctx.fillStyle = "#111";
    dctx.font = `800 ${Math.round(r*0.09)}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    dctx.textAlign = "center";
    dctx.textBaseline = "middle";
    dctx.fillText("0°",  r*0.78,  0);
    dctx.fillText("90°", 0,     -r*0.78);
    dctx.fillText("180°",-r*0.78, 0);
    dctx.fillText("270°",0,      r*0.78);

    // Moving needle:
    // With unit-circle convention, we can rotate by needleDeg directly.
    dctx.save();
    dctx.rotate((needleDegLocal * Math.PI) / 180);

    dctx.lineCap = "round";
    dctx.strokeStyle = "#111";
    dctx.lineWidth = r * 0.03;
    dctx.beginPath();
    dctx.moveTo(-r*0.06, 0);
    dctx.lineTo(r*0.78, 0);
    dctx.stroke();

    // tip triangle
    dctx.fillStyle = "#111";
    dctx.beginPath();
    dctx.moveTo(r*0.82, 0);
    dctx.lineTo(r*0.72, -r*0.06);
    dctx.lineTo(r*0.72,  r*0.06);
    dctx.closePath();
    dctx.fill();

    dctx.restore();

    // hub
    dctx.beginPath();
    dctx.arc(0,0,r*0.09,0,Math.PI*2);
    dctx.fillStyle = "#111";
    dctx.fill();

    dctx.beginPath();
    dctx.arc(0,0,r*0.05,0,Math.PI*2);
    dctx.fillStyle = "#fff";
    dctx.fill();

    dctx.restore();
  }

  // ===== Draw: Histogram =====
  function drawHistogram(){
    const w = histCanvas.width, h = histCanvas.height;
    hctx.clearRect(0,0,w,h);

    const padL = 60, padR = 18, padT = 20, padB = 46;
    const plotW = w - padL - padR;
    const plotH = h - padT - padB;

    // axes
    hctx.strokeStyle = "#111";
    hctx.lineWidth = 2;
    hctx.beginPath();
    hctx.moveTo(padL, padT);
    hctx.lineTo(padL, padT + plotH);
    hctx.lineTo(padL + plotW, padT + plotH);
    hctx.stroke();

    // labels
    hctx.fillStyle = "#111";
    hctx.font = "700 13px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    hctx.textAlign = "center";
    hctx.fillText("Angle (degrees, unit-circle)", padL + plotW/2, h - 14);

    hctx.save();
    hctx.translate(18, padT + plotH/2);
    hctx.rotate(-Math.PI/2);
    hctx.textAlign = "center";
    hctx.fillText("Count", 0, 0);
    hctx.restore();

    // max count for scaling
    let maxCount = 0;
    for (const c of binCounts) if (c > maxCount) maxCount = c;
    maxBinPill.textContent = `Max bin: ${maxCount}`;

    if (angles.length === 0){
      hctx.fillStyle = "#444";
      hctx.font = "14px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      hctx.textAlign = "center";
      hctx.fillText("Spin to build the histogram…", padL + plotW/2, padT + plotH/2);
      return;
    }

    // y ticks
    const yMax = Math.max(1, maxCount);
    const yticks = [0, Math.ceil(yMax/2), yMax];
    hctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    hctx.textAlign = "right";
    for (const t of yticks){
      const yy = padT + plotH - (t / yMax) * plotH;
      hctx.beginPath();
      hctx.moveTo(padL - 6, yy);
      hctx.lineTo(padL, yy);
      hctx.stroke();
      hctx.fillText(String(t), padL - 10, yy + 4);
    }

    // x ticks at 0, 90, 180, 270, 360
    const xticks = [0, 90, 180, 270, 360];
    hctx.textAlign = "center";
    for (const t of xticks){
      const x = padL + (t/360)*plotW;
      hctx.beginPath();
      hctx.moveTo(x, padT + plotH);
      hctx.lineTo(x, padT + plotH + 6);
      hctx.stroke();
      hctx.fillText(String(t), x, padT + plotH + 22);
    }

    // bars
    const barW = plotW / BIN_COUNT;
    for (let i = 0; i < BIN_COUNT; i++){
      const c = binCounts[i];
      const bh = (c / yMax) * plotH;
      const x = padL + i * barW;
      const y = padT + plotH - bh;

      hctx.fillStyle = "#111";
      hctx.fillRect(x + 1, y, Math.max(0, barW - 2), bh);

      hctx.strokeStyle = "#fff";
      hctx.lineWidth = 1;
      hctx.strokeRect(x + 1, y, Math.max(0, barW - 2), bh);
    }
  }

  // ===== Spinning =====
  function setButtonsDisabled(disabled){
    spinBtn.disabled = disabled;
    spin100Btn.disabled = disabled;
    spin1000Btn.disabled = disabled;
    clearBtn.disabled = disabled;
  }

  function spinAnimated(){
    if (spinning) return;
    spinning = true;
    setButtonsDisabled(true);
    setStatus("Spinning…");

    const target = Math.random() * 360; // Uniform(0,360)
    const extraTurns = 5 + Math.floor(Math.random() * 4); // 5–8
    const start = needleDeg;

    let end = start + extraTurns * 360;
    end = end - norm360(end) + target; // land exactly on target mod 360
    if (end <= start) end += 360;

    const duration = 2200 + Math.random() * 700;
    const t0 = performance.now();

    function step(now){
      const t = (now - t0) / duration;
      const clamped = Math.min(1, Math.max(0, t));
      const eased = easeOutCubic(clamped);

      needleDeg = start + (end - start) * eased;
      drawDial(needleDeg);

      if (clamped < 1){
        requestAnimationFrame(step);
      } else {
        needleDeg = end;
        drawDial(needleDeg);

        const finalAngle = norm360(needleDeg);
        angleText.textContent = formatDeg(finalAngle);
        recordAngle(finalAngle);

        setStatus("Done");
        spinning = false;
        setButtonsDisabled(false);
      }
    }
    requestAnimationFrame(step);
  }

  function spinFast(n){
    if (spinning) return;
    spinning = true;
    setButtonsDisabled(true);
    setStatus(`Spinning ${n} (fast)…`);

    let last = 0;
    for (let i = 0; i < n; i++){
      last = Math.random() * 360;
      recordAngle(last);
    }

    needleDeg = last;
    drawDial(needleDeg);
    angleText.textContent = formatDeg(norm360(last));

    setStatus("Done");
    spinning = false;
    setButtonsDisabled(false);
  }

  function clearData(){
    angles.length = 0;
    binCounts.fill(0);
    angleText.textContent = "—";
    setCount();
    updateMean();
    drawHistogram();
    setStatus("Ready");
  }

  // ===== Init =====
  drawDial(needleDeg);
  drawHistogram();
  setCount();
  updateMean();

  // ===== Events =====
  spinBtn.addEventListener('click', spinAnimated);
  spin100Btn.addEventListener('click', () => spinFast(100));
  spin1000Btn.addEventListener('click', () => spinFast(1000));
  clearBtn.addEventListener('click', clearData);
})();
</script>
</body>
</html>
